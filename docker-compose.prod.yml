services:
  # Frontend - Production build served with nginx
  frontend:
    # Distinct image name so prod builds never overwrite the dev image
    # (both compose files share service names).
    image: nosweat-frontend-prod
    build:
      context: .
      dockerfile: Dockerfile
      target: web
    ports:
      - "8080:80"
    depends_on:
      - backend
    environment:
      - NODE_ENV=production

  # Backend - Express API server (production)
  backend:
    image: nosweat-backend-prod
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - API_PORT=3001
